<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매뉴얼 편집</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <!-- 좌측 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">슬라이드</span>
      <span class="sidebar-count" id="slideCount">0</span>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- 사이드바 토글 버튼 -->
  <button class="sidebar-toggle" id="sidebarToggle" title="사이드바 접기/펼치기">◀</button>

  <!-- 메인 영역 -->
  <main class="main-area" id="mainArea">
    <!-- 상단 툴바 -->
    <header class="main-header">
      <div class="toolbar-group">
        <button class="toolbar-icon-btn" id="prevStepBtn" title="이전 슬라이드">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="toolbar-page" id="pageIndicator">0 / 0</span>
        <button class="toolbar-icon-btn" id="nextStepBtn" title="다음 슬라이드">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-title-wrap">
        <input type="text" id="slideTitle" class="slide-title-input" placeholder="슬라이드 제목을 입력하세요">
      </div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-group">
        <button class="toolbar-icon-btn" id="openEditorBtn" title="편집">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <button class="toolbar-icon-btn" id="duplicateStepBtn" title="복제">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="toolbar-icon-btn" id="deleteStepBtn" title="삭제">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
        <button class="toolbar-icon-btn" id="closeViewerBtn" title="닫기">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </header>

    <!-- 콘텐츠: 이미지 + 리사이즈 핸들 + 설명 -->
    <div class="content-area" id="contentArea">
      <!-- 스크린샷 영역 -->
      <div class="main-canvas" id="mainCanvas">
        <div class="canvas-empty" id="canvasEmpty">
          <p>슬라이드를 선택하세요</p>
        </div>
        <img id="mainImage" class="main-image" draggable="false" style="display:none;">
      </div>

      <!-- 리사이즈 핸들 -->
      <div class="resize-handle-h" id="resizeHandleH" style="display:none;">
        <div class="resize-handle-bar"></div>
      </div>

      <!-- 우측 설명 패널 -->
      <div class="desc-panel" id="descPanel" style="display:none;">
        <div class="desc-panel-header">
          <span>마커별 설명</span>
        </div>
        <div class="desc-panel-body" id="descPanelBody"></div>
      </div>
    </div>
  </main>

  <script src="viewer.js"></script>
</body>
</html>
