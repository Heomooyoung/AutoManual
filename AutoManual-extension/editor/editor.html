<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AutoManual - 편집기</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-layout">
    <!-- 좌측: 캔버스 영역 -->
    <div class="editor-canvas-area">
      <div class="slide-title-bar">
        <label class="slide-title-label">슬라이드 제목</label>
        <input type="text" id="slideTitleInput" class="slide-title-input" placeholder="슬라이드 제목을 입력하세요">
      </div>
      <div class="toolbar">
        <button class="tool-btn active" data-tool="select" title="선택">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 0l16 12.279-6.951 1.17 4.325 8.817-3.596 1.734-4.35-8.879-5.428 4.702z"/></svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="사각형">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="원형">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="화살표">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="4"/><polyline points="10 4 20 4 20 14"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" title="텍스트">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
        </button>
        <button class="tool-btn" data-tool="numbering" title="넘버링">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><text x="12" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor" stroke="none">1</text></svg>
        </button>
        <button class="tool-btn" data-tool="blur" title="블러">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" opacity="0.6"><circle cx="5" cy="5" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/><circle cx="5" cy="19" r="1.5"/><circle cx="12" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/></svg>
        </button>
        <button class="tool-btn" data-tool="image" title="사진 첨부">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button class="tool-btn" data-tool="crop" title="크롭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2v14a2 2 0 002 2h14"/><path d="M18 22V8a2 2 0 00-2-2H2"/></svg>
        </button>
        <span class="toolbar-sep"></span>
        <button class="tool-btn tool-undo" id="undoBtn" title="실행취소">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
        </button>
        <button class="tool-btn tool-clear" id="clearBtn" title="전체삭제">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
        <span class="toolbar-sep"></span>
        <div class="color-palette" id="colorPalette">
          <button class="color-btn active" data-color="#e63232" style="background:#e63232;" title="빨강"></button>
          <button class="color-btn" data-color="#007aff" style="background:#007aff;" title="파랑"></button>
          <button class="color-btn" data-color="#34c759" style="background:#34c759;" title="초록"></button>
          <button class="color-btn" data-color="#ff9500" style="background:#ff9500;" title="주황"></button>
          <button class="color-btn" data-color="#1B2A4A" style="background:#1B2A4A;" title="남색"></button>
          <span class="toolbar-sep-mini"></span>
          <button class="color-btn neon" data-color="#FFFF00" style="background:#FFFF00;" title="형광 노랑"></button>
          <button class="color-btn neon" data-color="#00FF80" style="background:#00FF80;" title="형광 초록"></button>
          <button class="color-btn neon" data-color="#FF69F5" style="background:#FF69F5;" title="형광 핑크"></button>
        </div>
        <span class="toolbar-sep"></span>
        <div class="badge-size-wrap">
          <select id="badgeSizeSelect" class="badge-size-select" title="번호 크기">
            <option value="20">소</option>
            <option value="28" selected>중</option>
            <option value="40">대</option>
            <option value="60">특대</option>
          </select>
        </div>
      </div>
      <!-- 텍스트 도구 옵션 바 -->
      <div class="tool-options" id="textOptions" style="display:none;">
        <label>크기: <select id="textSize">
          <option value="16">16px</option>
          <option value="20" selected>20px</option>
          <option value="28">28px</option>
          <option value="36">36px</option>
        </select></label>
        <label>색상: <input type="color" id="textColor" value="#e63232"></label>
        <span style="color:#6b7b9e; font-size:11px;">클릭한 위치에서 직접 입력</span>
      </div>
      <!-- 블러 강도 옵션 -->
      <div class="tool-options" id="blurOptions" style="display:none;">
        <label>블러 강도: <select id="blurStrength">
          <option value="8">약하게</option>
          <option value="16" selected>보통</option>
          <option value="30">강하게</option>
        </select></label>
      </div>
      <div class="canvas-container" id="canvasContainer">
        <canvas id="editorCanvas"></canvas>
      </div>
      <div class="canvas-hint" id="canvasHint">클릭하고 드래그하여 도형을 그리세요. 번호는 자동으로 매겨집니다.</div>
    </div>

    <!-- 리사이즈 핸들 -->
    <div class="editor-resize-handle" id="editorResizeHandle">
      <div class="editor-resize-bar"></div>
    </div>

    <!-- 우측: 설명 패널 -->
    <div class="editor-desc-panel" id="editorDescPanel">
      <div class="desc-panel-header">
        <span>마커별 설명</span>
        <div class="desc-panel-btns">
          <button id="closeBtn" class="close-btn">✕ 닫기</button>
        </div>
      </div>
      <div class="desc-list" id="descList">
        <div class="desc-empty">도형을 그리면 여기에 설명란이 생깁니다</div>
      </div>
    </div>
  </div>

  <input type="file" id="imageFileInput" accept="image/*" style="display:none">
  <script src="editor.js"></script>
</body>
</html>
