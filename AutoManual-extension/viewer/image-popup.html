<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캡처 이미지</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }
    .img-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: grab; position: relative;
    }
    .img-container.dragging { cursor: grabbing; }
    .img-container img {
      transform-origin: center center;
      transition: transform 0.1s ease;
      max-width: 100%; max-height: 100%;
      border-radius: 4px;
    }
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 10px;
      background: #2a2a2a; border-top: 1px solid #333;
    }
    .controls button {
      border: none; border-radius: 6px;
      background: #444; color: #fff;
      cursor: pointer; font-size: 14px;
      padding: 6px 14px;
      transition: background 0.15s;
    }
    .controls button:hover { background: #555; }
    .zoom-label {
      color: #aaa; font-size: 13px;
      min-width: 55px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="img-container" id="container">
    <img id="photo" draggable="false">
  </div>
  <div class="controls">
    <button id="zoomOut">−</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button id="zoomIn">+</button>
    <button id="resetBtn">1:1</button>
    <button id="fitBtn">맞춤</button>
  </div>
  <script src="image-popup.js"></script>
</body>
</html>
